<form id="formNovoIncidente" hx-post="/novo-ajax/" hx-target="#conteudoNovo" class="p-1">
    {% csrf_token %}

    <!-- Seção 1: Identificação Básica -->
    <div class="row g-2 mb-1">
        <div class="col-3">
            <label class="form-label fw-bold text-muted text-uppercase mb-0" style="font-size: 9px;">PROTOCOLO <span class="text-danger">*</span></label>
            <input type="text" name="mk_protocol" id="inputProtocolNovo" class="form-control form-control-sm shadow-none"
                placeholder="Ex: 1234.5" style="font-size: 11px;" required pattern="\d{4}\.\d{1,5}"
                maxlength="10"
                title="Formato esperado: XXXX.Y (Máximo 10 caracteres)">
            <div id="protocol-msg" class="mt-0"></div>
        </div>
        <div class="col-3">
            <label class="form-label fw-bold text-muted text-uppercase mb-0" style="font-size: 9px;">Status Inicial <span class="text-danger">*</span></label>
            <select name="status_id" class="form-select form-select-sm shadow-none" style="font-size: 11px;" required>
                {% for s in lista_status %}
                <option value="{{ s.id }}" {% if s.name == 'Em andamento' %}selected{% endif %}>{{ s.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="col-3">
            <label class="form-label fw-bold text-muted text-uppercase mb-0" style="font-size: 9px;">Tipo <span class="text-danger">*</span></label>
            <select name="incident_type_id" id="selectTipoNovo" class="form-select form-select-sm shadow-none"
                style="font-size: 11px;" required>
                <option value="">Selecione...</option>
                {% for t in lista_tipos %}
                <option value="{{ t.id }}">{{ t.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="col-3">
            <label class="form-label fw-bold text-muted text-uppercase mb-0" style="font-size: 9px;">Sintoma <span class="text-danger">*</span></label>
            <select name="reported_symptom_id" id="selectSintomaNovo" class="form-select form-select-sm shadow-none" style="font-size: 11px;"
                required>
                <option value="">Selecione...</option>
                {% for s in lista_sintomas %}
                <option value="{{ s.id }}">{{ s.name }}</option>
                {% endfor %}
            </select>
        </div>
    </div>

    <!-- Seção 2: Infra e Tempo -->
    <div class="row g-2 mb-1">
        <div class="col-4">
            <label class="form-label fw-bold text-muted text-uppercase mb-0" style="font-size: 9px;">Fonte de Detecção</label>
            <select name="detection_source_id" class="form-select form-select-sm shadow-none" style="font-size: 11px;">
                <option value="">Selecione...</option>
                {% for f in lista_fontes %}
                <option value="{{ f.id }}" {% if f.name == 'Monitoramento Proativo (Zabbix/Grafana)' %}selected{% endif %}>{{ f.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="col-4">
            <label class="form-label fw-bold text-muted text-uppercase mb-0" style="font-size: 9px;">Início Ocorrência <span class="text-danger">*</span></label>
            <input type="datetime-local" name="occured_at" id="inputOccuredAt"
                class="form-control form-control-sm shadow-none" value="{{ now|date:'Y-m-d\TH:i' }}"
                style="font-size: 11px;" required>
        </div>
        <div class="col-4">
            <label class="form-label fw-bold text-muted text-uppercase mb-0" style="font-size: 9px;">Designador <span class="text-danger">*</span></label>
            <div id="containerDefaultNovo" class="designador-field-novo">
                <input type="text" class="form-control form-control-sm shadow-none" placeholder="Aguardando tipo..." style="font-size: 11px;" disabled>
            </div>
            <div id="containerSiteNovo" class="designador-field-novo d-none">
                <input type="text" class="form-control form-control-sm shadow-none" list="listSitesNovo" id="inputSiteNovo" placeholder="Site..." style="font-size: 11px;">
                <input type="hidden" name="site_id" id="hiddenSiteIdNovo">
                <datalist id="listSitesNovo">
                    {% for site in lista_sites %}
                    <option data-id="{{ site.id }}" value="{{ site.name }}"></option>
                    {% endfor %}
                </datalist>
            </div>
            <div id="containerCircuitoBackboneNovo" class="designador-field-novo d-none">
                <input type="text" class="form-control form-control-sm shadow-none" list="listCircuitosBackboneNovo" id="inputCircuitoBackboneNovo" placeholder="Backbone..." style="font-size: 11px;">
                <datalist id="listCircuitosBackboneNovo">
                    {% for circ in lista_circuitos_backbone %}
                    <option data-id="{{ circ.id }}" value="{{ circ.name }}" data-site-a="{{ circ.site_a_full_name }}" data-site-z="{{ circ.site_z_full_name }}"></option>
                    {% endfor %}
                </datalist>
            </div>
            <div id="containerCircuitoCoreNovo" class="designador-field-novo d-none">
                <input type="text" class="form-control form-control-sm shadow-none" list="listCircuitosCoreNovo" id="inputCircuitoCoreNovo" placeholder="Core..." style="font-size: 11px;">
                <datalist id="listCircuitosCoreNovo">
                    {% for circ in lista_circuitos_core %}
                    <option data-id="{{ circ.id }}" value="{{ circ.name }}" data-provider="{{ circ.provider_name }}"></option>
                    {% endfor %}
                </datalist>
            </div>
            <div id="containerDeviceNovo" class="designador-field-novo d-none">
                <input type="text" class="form-control form-control-sm shadow-none" list="listDevicesNovo" id="inputDeviceNovo" placeholder="Device..." style="font-size: 11px;">
                <input type="hidden" name="device_id" id="hiddenDeviceIdNovo">
                <datalist id="listDevicesNovo">
                    {% for dev in lista_devices %}
                    <option data-id="{{ dev.id }}" value="{{ dev.name }}" data-region="{{ dev.region_name }}"></option>
                    {% endfor %}
                </datalist>
            </div>
            <input type="hidden" name="circuit_id" id="hiddenCircuitoIdNovo">
        </div>
    </div>

    <!-- Seção de Descrição -->
    <div class="mb-1">
        <label class="form-label fw-bold text-muted text-uppercase mb-0" style="font-size: 9px;">Descrição Automática / Detalhes <span class="text-danger">*</span></label>
        <textarea name="description" id="textareaDescricaoNovo" class="form-control form-control-sm shadow-none" rows="1"
            placeholder="Descreva o incidente..." style="font-size: 11px; resize: none; min-height: 32px;" required></textarea>
    </div>

    <!-- SEÇÃO GRUPADA: AFETAÇÃO (Campos dependentes) -->
    <div id="sectionAfetacao" class="border rounded p-2 mb-1" style="background-color: rgba(0,0,0,0.015);">
        <div class="row g-2 mb-1 align-items-end">
            <div class="col-4">
                <label class="form-label fw-bold text-muted text-uppercase mb-1 d-block text-center" style="font-size: 9px;">Status da Afetação</label>
                <div class="btn-group w-100 shadow-sm" role="group">
                    <input type="radio" class="btn-check" name="is_impact_active" id="impactoAtivoNovo" value="True" checked>
                    <label class="btn btn-outline-danger btn-sm py-0" for="impactoAtivoNovo" style="font-size: 11px; height: 24px; line-height: 24px;">Ativa</label>
                    <input type="radio" class="btn-check" name="is_impact_active" id="impactoInativoNovo" value="False">
                    <label class="btn btn-outline-success btn-sm py-0" for="impactoInativoNovo" style="font-size: 11px; height: 24px; line-height: 24px;">Inativa</label>
                </div>
            </div>
            <div class="col-4">
                <label class="form-label fw-bold text-muted text-uppercase mb-0" style="font-size: 9px;">SLA Inicial</label>
                <select name="sla_id" id="selectSlaNovo" class="form-select form-select-sm shadow-none" style="font-size: 11px;">
                    <option value="">Selecione...</option>
                    {% for s in lista_slas %}
                    <option value="{{ s.id }}" data-hours="{{ s.name|slice:':-1' }}" {% if s.name == '4h' %}selected{% endif %}>{{ s.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-4">
                <label class="form-label fw-bold text-muted text-uppercase mb-0" style="font-size: 9px;">Segmento Cliente</label>
                <select name="client_type_id" class="form-select form-select-sm shadow-none" style="font-size: 11px;">
                    <option value="">Selecione...</option>
                    {% for c in lista_clientes %}
                    <option value="{{ c.id }}">{{ c.name }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div class="row g-2 mb-1">
            <div class="col-4">
                <label class="form-label fw-bold text-muted text-uppercase mb-0" style="font-size: 9px;">Tipo de Impacto</label>
                <select name="impact_type_id" class="form-select form-select-sm shadow-none" style="font-size: 11px;">
                    <option value="">Selecione...</option>
                    {% for t in lista_impacto_tipos %}
                    <option value="{{ t.id }}">{{ t.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-4">
                <label class="form-label fw-bold text-muted text-uppercase mb-0" style="font-size: 9px;">Nível Impacto</label>
                <select name="impact_level_id" class="form-select form-select-sm shadow-none" style="font-size: 11px;">
                    <option value="">Selecione...</option>
                    {% for l in lista_impacto_niveis %}
                    <option value="{{ l.id }}">{{ l.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-4">
                <label id="labelExpectedAt" class="form-label fw-bold text-muted text-uppercase mb-0" style="font-size: 9px;">Previsão</label>
                <input type="datetime-local" name="expected_at" id="inputExpectedAt" class="form-control form-control-sm shadow-none" style="font-size: 11px;">
            </div>
        </div>

        <!-- Regiões Afetadas -->
        <div id="containerRegionsNovo" class="mt-1">
            <div class="d-flex justify-content-between align-items-center mb-1 px-2 py-1 rounded border" style="background-color: rgba(0,0,0,0.025);">
                <label class="form-label fw-bold text-muted text-uppercase mb-0" style="font-size: 9px;">
                    <i class="bi bi-geo-alt-fill me-1" style="color: #008891;"></i>Cidades Afetadas
                </label>
                <div class="input-group" style="width: 140px;">
                    <span class="input-group-text py-0 px-2 bg-transparent border-end-0" style="font-size: 10px; border-color: rgba(0,0,0,0.1);"><i class="bi bi-search"></i></span>
                    <input type="text" id="filterRegions" class="form-control form-control-sm border-start-0 shadow-none py-0 px-2"
                        placeholder="Filtrar..." style="font-size: 11px; height: 22px; border-color: rgba(0,0,0,0.1);">
                </div>
            </div>
            <div id="selectedRegionsTags" class="d-flex flex-wrap gap-1 mb-1" style="min-height: 14px;"></div>
            <div class="border rounded p-1 bg-body-tertiary overflow-auto" id="containerRegionsList" style="max-height: 60px;">
                <div class="row g-1">
                    {% for region in lista_regioes %}
                    <div class="col-4 region-item">
                        <div class="form-check mb-0" style="min-height: auto;">
                            <input class="form-check-input region-checkbox" type="checkbox" name="affected_regions"
                                value="{{ region.id }}" id="regNovo_{{ region.id }}" data-name="{{ region.name }}" style="width: 12px; height: 12px; margin-top: 0.25rem;">
                            <label class="form-check-label" for="regNovo_{{ region.id }}" style="font-size: 10px; cursor: pointer; line-height: 1.5;">
                                {{ region.name }}
                            </label>
                        </div>
                    </div>
                    {% endfor %}
                </div>
            </div>
        </div>
    </div>

    <div class="modal-footer border-top p-3"
        style="margin: 0 -12px -12px -12px; border-bottom-left-radius: 15px; border-bottom-right-radius: 15px; background-color: rgba(0,0,0,0.03); border-top: 1px solid rgba(0,0,0,0.05) !important;">
        <button type="button" class="btn btn-sm btn-secondary" data-bs-dismiss="modal"
            style="font-size: 12px;">Cancelar</button>
        <button type="submit" class="btn btn-sm text-white px-4 fw-bold shadow-sm"
            style="background-color: #008891; font-size: 12px; border-radius: 8px;">
            <i class="bi bi-rocket-takeoff me-1"></i> Abrir Incidente
        </button>
    </div>
</form>

<script>
    (function () {
        const inputProtocol = document.getElementsByName('mk_protocol')[0];
        if (inputProtocol) {
            inputProtocol.addEventListener('input', function (e) {
                // Limpa mensagem de erro se o usuário digitar
                const msgDiv = document.getElementById('protocol-msg');
                if (msgDiv) msgDiv.innerHTML = '';
                
                let val = this.value.replace(/[^\d.]/g, '');

                // Auto-ponto: Adiciona ponto automaticamente após o 4º dígito se não houver um
                // Ignora se for uma operação de deleção para permitir apagar o ponto
                if (e.inputType !== 'deleteContentBackward' && e.inputType !== 'deleteContentForward') {
                    if (val.length === 4 && !val.includes('.')) {
                        val = val + '.';
                    }
                }
                
                this.value = val;
            });
        }

        // Listener para protocolo duplicado
        document.body.addEventListener('protocoloDuplicado', function(evt) {
            const msgDiv = document.getElementById('protocol-msg');
            if (msgDiv) {
                msgDiv.innerHTML = evt.detail.value;
                // Processa o novo HTML para o HTMX funcionar no link
                htmx.process(msgDiv);
            }
        });

        const inputOccured = document.getElementById('inputOccuredAt');
        const inputETR = document.getElementById('inputExpectedAt');
        const selectSla = document.getElementById('selectSlaNovo');
        const radioAtivo = document.getElementById('impactoAtivoNovo');
        const labelETR = document.getElementById('labelExpectedAt');
        const containerRegions = document.getElementById('containerRegionsNovo');
        const selectTipo = document.getElementById('selectTipoNovo');

        // Lógica de Sync para Datalists (Idêntica ao Pencil Edit)
        function setupSync(inputId, listId, hiddenId) {
            const input = document.getElementById(inputId);
            const list = document.getElementById(listId);
            const hidden = document.getElementById(hiddenId);
            if (!input || !list || !hidden) return;

            input.addEventListener('input', function () {
                const val = this.value;
                const options = list.options;
                let found = false;
                for (let i = 0; i < options.length; i++) {
                    if (options[i].value === val) {
                        hidden.value = options[i].getAttribute('data-id');
                        found = true;
                        break;
                    }
                }

                if (!found && val.length > 0) {
                    hidden.value = "";
                    this.setCustomValidity("Selecione um item válido da lista (não é permitido texto livre).");
                } else {
                    this.setCustomValidity("");
                }
                this.reportValidity();
            });
        }

        setupSync('inputSiteNovo', 'listSitesNovo', 'hiddenSiteIdNovo');
        setupSync('inputCircuitoBackboneNovo', 'listCircuitosBackboneNovo', 'hiddenCircuitoIdNovo');
        setupSync('inputCircuitoCoreNovo', 'listCircuitosCoreNovo', 'hiddenCircuitoIdNovo');
        setupSync('inputDeviceNovo', 'listDevicesNovo', 'hiddenDeviceIdNovo');

        function toggleDesignadores() {
            if (!selectTipo) return;
            const tipoNome = selectTipo.options[selectTipo.selectedIndex].text;
            const defaultContainer = document.getElementById('containerDefaultNovo');

            // Oculta todos e remove obrigatoriedade
            document.querySelectorAll('.designador-field-novo').forEach(el => {
                el.classList.add('d-none');
                const inp = el.querySelector('input[type="text"]');
                if (inp) {
                    inp.removeAttribute('required');
                    inp.setCustomValidity("");
                }
            });

            // Mostra o relevante e torna obrigatório
            let targetId = "";
            if (tipoNome === 'Site') targetId = 'containerSiteNovo';
            else if (tipoNome === 'Backbone') targetId = 'containerCircuitoBackboneNovo';
            else if (tipoNome === 'Core') targetId = 'containerCircuitoCoreNovo';
            else if (tipoNome === 'R.A.' || tipoNome === 'Equipamento') targetId = 'containerDeviceNovo';

            if (targetId) {
                const container = document.getElementById(targetId);
                container.classList.remove('d-none');
                const inp = container.querySelector('input[type="text"]');
                if (inp) inp.setAttribute('required', 'required');
            } else if (defaultContainer) {
                // Se nenhum selecionado, volta pro default
                defaultContainer.classList.remove('d-none');
            }
        }

        selectTipo.addEventListener('change', toggleDesignadores);

        function atualizarEtrPeloSla() {
            if (!inputOccured.value) return;
            const selectedOption = selectSla.options[selectSla.selectedIndex];
            const hoursRaw = selectedOption.dataset.hours;
            if (hoursRaw && !isNaN(hoursRaw)) {
                const hours = parseInt(hoursRaw);
                const startDate = new Date(inputOccured.value);
                const endDate = new Date(startDate.getTime() + (hours * 60 * 60 * 1000));
                const yyyy = endDate.getFullYear();
                const mm = String(endDate.getMonth() + 1).padStart(2, '0');
                const dd = String(endDate.getDate()).padStart(2, '0');
                const hh = String(endDate.getHours()).padStart(2, '0');
                const min = String(endDate.getMinutes()).padStart(2, '0');
                inputETR.value = `${yyyy}-${mm}-${dd}T${hh}:${min}`;
            }
        }

        selectSla.addEventListener('change', atualizarEtrPeloSla);
        inputOccured.addEventListener('change', atualizarEtrPeloSla);

        function toggleImpacto() {
            const section = document.getElementById('sectionAfetacao');
            const impactType = document.querySelector('select[name="impact_type_id"]');
            const impactLevel = document.querySelector('select[name="impact_level_id"]');
            const clientType = document.querySelector('select[name="client_type_id"]');

            if (radioAtivo.checked) {
                inputETR.removeAttribute('disabled');
                inputETR.setAttribute('required', 'required');
                if (impactType) impactType.removeAttribute('disabled');
                if (impactLevel) impactLevel.removeAttribute('disabled');
                if (selectSla) selectSla.removeAttribute('disabled');
                if (clientType) clientType.removeAttribute('disabled');
                labelETR.innerHTML = 'Previsão <span class="text-danger">*</span>';
                if (section) {
                    section.style.opacity = '1';
                    section.style.pointerEvents = 'auto';
                }
                atualizarEtrPeloSla();
            } else {
                inputETR.setAttribute('disabled', 'disabled');
                inputETR.removeAttribute('required');
                inputETR.value = '';
                if (impactType) {
                    const opt = Array.from(impactType.options).find(o => o.text === 'Nenhum');
                    if (opt) impactType.value = opt.value;
                    impactType.setAttribute('disabled', 'disabled');
                }
                if (impactLevel) {
                    const opt = Array.from(impactLevel.options).find(o => o.text === 'Nenhum cliente');
                    if (opt) impactLevel.value = opt.value;
                    impactLevel.setAttribute('disabled', 'disabled');
                }
                if (selectSla) {
                    const opt = Array.from(selectSla.options).find(o => o.text === 'Sem SLA');
                    if (opt) selectSla.value = opt.value;
                    selectSla.setAttribute('disabled', 'disabled');
                }
                if (clientType) {
                    const opt = Array.from(clientType.options).find(o => o.text === 'Nenhum');
                    if (opt) clientType.value = opt.value;
                    clientType.setAttribute('disabled', 'disabled');
                }
                labelETR.innerHTML = 'Previsão';
                if (section) {
                    section.style.opacity = '0.5';
                    // Deixamos pointer-events auto para permitir clicar no botão de rádio novamente
                }
                checkboxes.forEach(cb => cb.checked = false);
                updateTags();
            }
        }

        document.getElementsByName('is_impact_active').forEach(r => {
            r.addEventListener('change', toggleImpacto);
        });

        const filterInput = document.getElementById('filterRegions');
        const tagsContainer = document.getElementById('selectedRegionsTags');
        const checkboxes = document.querySelectorAll('.region-checkbox');
        const regionItems = document.querySelectorAll('.region-item');

        function updateTags() {
            tagsContainer.innerHTML = '';
            checkboxes.forEach(cb => {
                if (cb.checked) {
                    const tag = document.createElement('span');
                    tag.className = 'badge d-flex align-items-center gap-1 py-1 px-2';
                    tag.style.fontSize = '9px';
                    tag.style.cursor = 'pointer';
                    tag.style.borderRadius = '12px';
                    tag.style.backgroundColor = '#60c4b0';
                    tag.style.color = '#fff';
                    tag.innerHTML = `${cb.dataset.name} <i class="bi bi-x-circle-fill"></i>`;
                    tag.onclick = () => {
                        cb.checked = false;
                        updateTags();
                    };
                    tagsContainer.appendChild(tag);
                }
            });
        }

        if (filterInput) {
            filterInput.addEventListener('input', function () {
                const term = this.value.toLowerCase();
                regionItems.forEach(item => {
                    const label = item.querySelector('label').innerText.toLowerCase();
                    if (label.includes(term)) item.classList.remove('d-none');
                    else item.classList.add('d-none');
                });
            });
        }

        checkboxes.forEach(cb => cb.addEventListener('change', updateTags));

        // --- LÓGICA DE DESCRIÇÃO AUTOMÁTICA ---
        const textareaDesc = document.getElementById('textareaDescricaoNovo');
        const selectSintoma = document.getElementById('selectSintomaNovo');

        function updateAutomaticDescription() {
            if (!selectTipo || !selectSintoma || !textareaDesc) return;
            
            const tipoText = selectTipo.options[selectTipo.selectedIndex].text.trim();
            const sintomaText = selectSintoma.value ? selectSintoma.options[selectSintoma.selectedIndex].text.trim() : "";
            
            if (!tipoText || tipoText === 'Selecione...') {
                return;
            }

            let designadorText = "";
            let extraInfo = "";
            let prefixoDesc = "Incidente de " + tipoText;
            const baseSintoma = sintomaText || "Incidente";

            if (tipoText === 'Site') {
                designadorText = document.getElementById('inputSiteNovo').value.trim();
                prefixoDesc = `${baseSintoma} de Site: ${designadorText}`;
            } else if (tipoText === 'Backbone') {
                const inputBackbone = document.getElementById('inputCircuitoBackboneNovo');
                const val = inputBackbone.value.trim();
                const list = document.getElementById('listCircuitosBackboneNovo');
                if (list) {
                    const opt = Array.from(list.options).find(o => o.value === val);
                    if (opt) {
                        const cityA = opt.dataset.siteA || "";
                        const cityZ = opt.dataset.siteZ || "";
                        if (cityA && cityZ) extraInfo = ` em ${cityA} x ${cityZ}`;
                        else if (cityA || cityZ) extraInfo = ` em ${cityA || cityZ}`;
                        designadorText = "ACTIVE"; 
                    }
                }
                prefixoDesc = `${baseSintoma} de backbone${extraInfo}`;
            } else if (tipoText === 'Core') {
                const inputCore = document.getElementById('inputCircuitoCoreNovo');
                const val = inputCore.value.trim();
                const list = document.getElementById('listCircuitosCoreNovo');
                if (list) {
                    const opt = Array.from(list.options).find(o => o.value === val);
                    if (opt) {
                        const provider = opt.dataset.provider || "N/D";
                        designadorText = "ACTIVE";
                        prefixoDesc = `${baseSintoma} de Core IP em ${val} - ${provider}`;
                    }
                }
            } else if (tipoText === 'Equipamento') {
                designadorText = document.getElementById('inputDeviceNovo').value.trim();
                if (designadorText) {
                    prefixoDesc = `${baseSintoma} de equipamento ${designadorText}`;
                }
            } else if (tipoText === 'R.A.') {
                const inputRA = document.getElementById('inputDeviceNovo');
                const val = inputRA.value.trim();
                const list = document.getElementById('listDevicesNovo');
                if (list) {
                    const opt = Array.from(list.options).find(o => o.value === val);
                    if (opt) {
                        const region = opt.dataset.region || "N/D";
                        designadorText = "ACTIVE";
                        prefixoDesc = `${baseSintoma} de R.A em ${region} - ${val}: (COMPLEMENTAR COM SLOT E PON)`;
                    }
                }
            }

            if (designadorText) {
                if (textareaDesc.value !== prefixoDesc) {
                    textareaDesc.value = prefixoDesc;
                }
            }
        }

        [selectTipo, selectSintoma].forEach(el => el.addEventListener('change', updateAutomaticDescription));
        ['inputSiteNovo', 'inputCircuitoBackboneNovo', 'inputCircuitoCoreNovo', 'inputDeviceNovo'].forEach(id => {
            const el = document.getElementById(id);
            if (el) {
                el.addEventListener('input', updateAutomaticDescription);
                el.addEventListener('change', updateAutomaticDescription);
            }
        });

        toggleDesignadores();
        toggleImpacto();
        updateTags();
    })();
</script>
